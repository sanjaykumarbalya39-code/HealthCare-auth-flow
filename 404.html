<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Page not found — MedCare Health biotechnology platform.">
  <title>404 — Page Not Found | MedCare Health</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/preloader.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="preloader-active">
  <div id="preloader" class="preloader" role="status" aria-live="polite" aria-busy="true" aria-label="Loading">
    <div class="preloader__bg" aria-hidden="true"></div>
    <div class="preloader__inner">
      <div class="preloader__helix" aria-hidden="true">
        <svg class="preloader__dna" viewBox="0 0 64 64" fill="none">
          <path class="preloader__strand preloader__strand--a" d="M32 4 C20 16, 44 28, 32 40 C20 52, 44 60, 32 60" stroke="url(#e404A)" stroke-width="2.5" stroke-linecap="round"/>
          <path class="preloader__strand preloader__strand--b" d="M32 4 C44 16, 20 28, 32 40 C44 52, 20 60, 32 60" stroke="url(#e404B)" stroke-width="2.5" stroke-linecap="round"/>
          <circle class="preloader__node" cx="32" cy="12" r="3" fill="#3d7fe0"/>
          <circle class="preloader__node" cx="22" cy="28" r="3" fill="#0B5ED7"/>
          <circle class="preloader__node" cx="42" cy="28" r="3" fill="#14D6C4"/>
          <defs>
            <linearGradient id="e404A" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#3d7fe0"/><stop offset="100%" stop-color="#0B5ED7"/></linearGradient>
            <linearGradient id="e404B" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#0B5ED7"/><stop offset="100%" stop-color="#094fb5"/></linearGradient>
          </defs>
        </svg>
      </div>
      <img src="assets/stackly-logo.webp" alt="MedCare Health" class="preloader__logo" width="180" height="52">
      <p class="preloader__tagline">Healthcare &amp; Life Sciences</p>
      <div class="preloader__bar" aria-hidden="true"><span class="preloader__bar-fill" id="preloaderBar"></span></div>
      <p class="preloader__status" id="preloaderStatus">Scanning genetic index…</p>
    </div>
  </div>

  <main class="error-page page-reveal" id="main-content">
    <div class="error-page__bg" aria-hidden="true"></div>
    <div class="error-page__particles" id="particles" aria-hidden="true"></div>

    <svg class="error-page__dna error-page__dna--left" viewBox="0 0 64 120" fill="none" aria-hidden="true">
      <path d="M32 0 C20 20, 44 40, 32 60 C20 80, 44 100, 32 120" stroke="#3d7fe0" stroke-width="2" stroke-linecap="round"/>
      <path d="M32 0 C44 20, 20 40, 32 60 C44 80, 20 100, 32 120" stroke="#0B5ED7" stroke-width="2" stroke-linecap="round"/>
      <circle cx="32" cy="20" r="4" fill="#14D6C4"/>
      <circle cx="22" cy="50" r="4" fill="#3d7fe0"/>
      <circle cx="42" cy="50" r="4" fill="#0B5ED7"/>
      <circle cx="32" cy="80" r="4" fill="#14D6C4"/>
      <circle cx="22" cy="110" r="4" fill="#3d7fe0"/>
      <circle cx="42" cy="110" r="4" fill="#0B5ED7"/>
    </svg>

    <svg class="error-page__dna error-page__dna--right" viewBox="0 0 64 120" fill="none" aria-hidden="true">
      <path d="M32 0 C20 20, 44 40, 32 60 C20 80, 44 100, 32 120" stroke="#14D6C4" stroke-width="2" stroke-linecap="round"/>
      <path d="M32 0 C44 20, 20 40, 32 60 C44 80, 20 100, 32 120" stroke="#00A8A8" stroke-width="2" stroke-linecap="round"/>
    </svg>

    <div class="error-content">
      <img src="assets/stackly-logo.webp" alt="MedCare Health" width="160" height="44" style="margin:0 auto 32px;height:44px;width:auto">
      <p class="error-content__code" aria-hidden="true">404</p>
      <h1 class="error-content__title">Page Not Found</h1>
      <p class="error-content__message">The genetic sequence you are searching for could not be identified. This page may have been moved, renamed, or no longer exists in our biotechnology database.</p>
      <div class="error-actions">
        <a href="login.html" class="btn btn--primary btn--lg">Back to login</a>
        
      </div>
    </div>
  </main>

  <script src="js/preloader.js"></script>
  <script>
    (function () {
      var container = document.getElementById('particles');
      if (!container) return;
      for (var i = 0; i < 40; i++) {
        var p = document.createElement('span');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.top = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 8 + 's';
        p.style.animationDuration = 6 + Math.random() * 6 + 's';
        p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
        container.appendChild(p);
      }
    })();
  </script>
</body>
</html>
